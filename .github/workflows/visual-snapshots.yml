name: Visual Snapshots

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to update with CI-generated visual screenshots.
        required: true
        type: string

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch }}

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Build Storybook
        run: pnpm --filter @ds/storybook build

      - name: Install Playwright browsers
        run: pnpm --filter @ds/tests exec playwright install --with-deps chromium

      - name: Update visual snapshots
        run: pnpm --filter @ds/tests test:visual:update

      - name: Upload visual snapshots
        uses: actions/upload-artifact@v4
        with:
          name: visual-snapshots
          path: tests/visual/__screenshots__
          retention-days: 7

      - name: Commit visual snapshots
        run: |
          if [ -z "$(git status --short tests/visual/__screenshots__)" ]; then
            echo "No visual snapshot changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/visual/__screenshots__
          git commit -m "test: update visual snapshots"
          git push
