name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure npm auth
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "Missing NPM_TOKEN repository secret."
            exit 1
          fi

          printf '%s\n' "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > "$HOME/.npmrc"
          printf '%s\n' "registry=https://registry.npmjs.org/" >> "$HOME/.npmrc"

      - name: Determine next version
        id: nextver
        run: |
          pnpm exec changeset status --output=plan.json
          NEXT=$(node -e "
            const p = require('./plan.json');
            const r = p.releases.find(x => x.name === '@jsekulowicz/ds-components') || p.releases[0];
            console.log(r ? r.newVersion : '');
          ")
          rm -f plan.json
          if [ -n "$NEXT" ]; then
            echo "title=release: $NEXT" >> "$GITHUB_OUTPUT"
          else
            echo "title=chore: version packages" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run version
          publish: pnpm run release
          commit: ${{ steps.nextver.outputs.title }}
          title: ${{ steps.nextver.outputs.title }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
