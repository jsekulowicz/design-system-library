name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Generated code matches its generators
        run: git diff --exit-code -- packages/components/src/atoms/icon/icons packages/react/src

      - name: Typecheck
        run: pnpm typecheck

      - name: Dead code check
        run: pnpm lint:dead-code

      - name: Lit static validation
        run: pnpm lint:lit

      - name: Lit analyzer validation
        run: pnpm lint:lit:analyzer

      - name: Unit tests
        run: pnpm test

      - name: Size budgets
        run: pnpm size

      - name: Build Storybook
        run: pnpm --filter @ds/storybook build

      - name: Install Playwright browsers
        run: pnpm --filter @ds/tests exec playwright install --with-deps chromium

      - name: Playwright (e2e + a11y)
        run: pnpm --filter @ds/tests test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright-report
          retention-days: 7

  visual:
    # Runs inside the pinned Playwright image so CI rendering is byte-identical to
    # local `pnpm test:visual:docker`. Browsers and fonts ship with the image, so no
    # `playwright install` is needed and the environment cannot drift with ubuntu-latest.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
      options: --ipc=host
    steps:
      - uses: actions/checkout@v6

      - name: Enable Corepack
        run: corepack enable

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Build Storybook
        run: pnpm --filter @ds/storybook build

      - name: Playwright visual
        if: ${{ hashFiles('tests/visual/__screenshots__/*.png') != '' }}
        run: pnpm --filter @ds/tests test:visual

      - name: Upload Playwright visual report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-visual-report
          path: |
            tests/visual-report
            tests/visual-results
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Playwright visual diffs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-visual-diffs
          path: |
            tests/visual-results/**/*-expected.png
            tests/visual-results/**/*-actual.png
            tests/visual-results/**/*-diff.png
            tests/visual-results/**/error-context.md
          if-no-files-found: ignore
          retention-days: 7
