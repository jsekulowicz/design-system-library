name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lit static validation
        run: pnpm lint:lit

      - name: Lit analyzer validation
        run: pnpm lint:lit:analyzer

      - name: Unit tests
        run: pnpm test

      - name: Size budgets
        run: pnpm size

      - name: Build Storybook
        run: pnpm --filter @ds/storybook build

      - name: Install Playwright browsers
        run: pnpm --filter @ds/tests exec playwright install --with-deps chromium

      - name: Playwright (e2e + a11y)
        run: pnpm --filter @ds/tests test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright-report
          retention-days: 7
